          '[{OTHER_TSL_CERTIFICATE_B64}]': ee.test_gov.tsl.server.processor.KeyStoreResourceToBase64CertificateMapper

    - serve-as: lotl.xml
      signer:
        key-alias: signer-4
        keystore: file:examples/pivot-transition/numbered-signers.keystore.p12
        keystore-password: changeit
        signature-parameters-builder: ee.test_gov.tsl.server.signature.TrustedListV5SignatureParametersBuilderFactory
        signature-digest-algorithm: SHA384
        claimed-signing-time: 2026-04-09T12:00:00Z
      template:
        source: file:examples/test-lotl-EE-7-with-pivot-support.xml.template
        placeholder-mappings:
          '[{TSL_VERSION_IDENTIFIER}]': '5'
          '[{TSL_SEQUENCE_NUMBER}]': '4'
          '[{SCHEME_INFORMATION_URI_LIST}]': >-
            <URI xml:lang="en">${tsl.base-url}/lotl-pivot-3.xml</URI>
            <URI xml:lang="en">https://oj/legal-content/EN/TXT/?uri=uriserv:new_OJ_URI.ENG</URI>
            <URI xml:lang="en">${tsl.base-url}/lotl-pivot-2.xml</URI>
            <URI xml:lang="en">${tsl.base-url}/lotl-pivot-1.xml</URI>
            <URI xml:lang="en">https://oj/legal-content/EN/TXT/?uri=uriserv:old_OJ_URI.ENG</URI>
            <URI xml:lang="en">${tsl.base-url}/lotl-legalnotice.html#en</URI>
            <URI xml:lang="et">${tsl.base-url}/lotl-legalnotice.html#et</URI>
          '[{LOTL_DIGITAL_IDENTITIES_LIST}]': "\
            file:examples/pivot-transition/numbered-signers-4-5-6.truststore.p12|pass:changeit|\
            prefix:<ServiceDigitalIdentity><DigitalId><X509Certificate>|\
